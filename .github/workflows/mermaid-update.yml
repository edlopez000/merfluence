name: Mermaid update

# CI gate + version currency. Every PR runs the corpus and audit, so nothing
# merges to main untested — including the Renovate bump PRs configured in
# renovate.json, which is where new Mermaid versions enter the repo.
# A clean corpus means the syntax our customers already wrote still parses, so a
# merge that touches shipped code ships to staging with no human in the loop.
# Marketplace minor updates do not require re-approval — they trigger a
# vulnerability scan that closes on its own — so upstream release to customer
# browsers is under an hour.

on:
  # No workflow-level paths filter, on purpose: the corpus and audit are required
  # status checks, so they must report on EVERY PR. A paths filter here would skip
  # them on a CI-only PR, and a required check that never runs blocks the PR
  # forever. Deploy is instead gated per-job by the `changes` job below, which is
  # not a required check and so is safe to skip. Deploy jobs also stay gated on
  # push-to-main, so PRs never ship.
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  corpus:
    name: Diagram corpus
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned: these jobs sit next to ones holding deploy credentials, and
      # a tag is mutable — v4 can be repointed at any commit by anyone who can
      # push a tag. Renovate bumps these using the trailing version comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 -- the last 22.x before the node-fetch keep-alive
          # regression in 22.23.x. On 22.23.x the Forge CLI (still on node-fetch@2)
          # throws ERR_STREAM_PREMATURE_CLOSE mid-request fetching Atlassian's
          # OpenAPI schemas, failing lint AND deploy. Root cause is Node, not the
          # CLI: nodejs/node#63989, Atlassian FRGE-1750. 22.23.1 and 24.17.0 are
          # also on Forge's own Node blocklist. Bare "22" resolves to the latest
          # (bad) 22.x, so keep it exact.
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      # The browser test project renders in real Chromium (mermaid.render needs
      # getBBox, absent in jsdom). --no-install uses the pinned devDependency
      # rather than fetching one off the network mid-run; --with-deps pulls the
      # OS libraries headless Chromium needs on the runner.
      - name: Install Playwright Chromium
        run: npx --no-install playwright install --with-deps chromium
      # Runs both vitest projects and enforces the coverage floor:
      #   unit    — fixture corpus (both majors), sanitizer boundary, manifest
      #             invariant (see test/manifest.test.js for why the manifest is
      #             asserted here, not by `forge lint` which needs credentials),
      #             plus host.js / registry / React-view orchestration.
      #   browser — the end-to-end render pipeline and the malicious-diagram XSS
      #             E2E, the one place the three security layers are proven to
      #             hold together against a real rendered SVG.
      - name: Tests + coverage
        run: npm run test:coverage
      - name: Report coverage
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          node -e "const t=require('./coverage/coverage-summary.json').total; for (const k of ['lines','statements','functions','branches']) console.log('- '+k+': '+t[k].pct+'%')" >> "$GITHUB_STEP_SUMMARY"
      - name: Both bundles build
        run: npm run build
      - name: Report resolved versions
        run: |
          echo "### Mermaid versions" >> "$GITHUB_STEP_SUMMARY"
          node -p "'auto/11 -> ' + require('./node_modules/mermaid/package.json').version" >> "$GITHUB_STEP_SUMMARY"
          node -p "'pinned 10 -> ' + require('./node_modules/mermaid-10/package.json').version" >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned for the same reason as every other action in this file: a tag
      # is mutable. Renovate bumps these using the trailing version comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 -- the last 22.x before the node-fetch keep-alive
          # regression in 22.23.x. Not strictly needed to run ESLint, but every
          # job here installs from the same lockfile, and a second Node version
          # in the matrix is a second cache key and a second thing to debug.
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      # `lint` is ESLint over src/, test/, scripts/ and the build configs; it is
      # NOT `lint:forge`, which validates the manifest, needs Atlassian
      # credentials, and therefore runs only in the staging job. This job holds
      # no environment and no FORGE_* secrets.
      - name: ESLint
        run: npm run lint
      # Formatting is Prettier's alone (eslint-config-prettier is last in
      # eslint.config.js), so it gets its own step: a failure here means "run
      # npm run format", never "fix a bug".
      - name: Prettier
        run: npm run format:check

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 -- the last 22.x before the node-fetch keep-alive
          # regression in 22.23.x. On 22.23.x the Forge CLI (still on node-fetch@2)
          # throws ERR_STREAM_PREMATURE_CLOSE mid-request fetching Atlassian's
          # OpenAPI schemas, failing lint AND deploy. Root cause is Node, not the
          # CLI: nodejs/node#63989, Atlassian FRGE-1750. 22.23.1 and 24.17.0 are
          # also on Forge's own Node blocklist. Bare "22" resolves to the latest
          # (bad) 22.x, so keep it exact.
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      # Critical or high findings block the Marketplace update anyway.
      # Better to learn it here than from an AMS ticket. Scope to prod deps:
      # only the runtime bundle ships to customer browsers, and dev-server
      # tooling (vitest/vite/esbuild/@forge/cli) can't reach the deployed
      # Forge artifact.
      - run: npm audit --omit=dev --audit-level=high

  size:
    name: Bundle size budget
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned like every action in this file: a tag is mutable. Renovate
      # bumps these using the trailing version comment.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 for lockfile-cache parity with the other jobs, not
          # because size-limit needs it -- see the corpus job for the 22.23.x
          # node-fetch regression this pin avoids.
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      # size-limit reads the built entry chunks, so the bundles must exist first.
      # It measures ONLY the `entry-*` chunks (see .size-limit.js) -- the JS the
      # iframe loads before any diagram renders -- and fails the PR if either
      # entry crosses its budget, catching a deferred engine (Cytoscape/KaTeX/
      # ELK) accidentally folded into initial load, or an entry-inflating bump.
      - name: Build bundles
        run: npm run build
      - name: Check bundle size
        run: npm run size

  # Did this push touch anything that actually ships? A change confined to CI,
  # tests, or docs produces a byte-identical Forge bundle, so deploying it burns a
  # production approval for nothing — and trains the reviewer to approve without
  # looking. staging consults this to decide whether to run at all.
  #
  # This job holds no environment and no FORGE_* secrets. That is deliberate: it
  # is why a third-party action is acceptable here where it would not be beside
  # deploy credentials.
  changes:
    name: Detect shippable changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      shippable: ${{ steps.decide.outputs.shippable }}
    steps:
      # dorny diffs a push against github.event.before, so it needs the base
      # commit checked out (a PR would not). Same SHA pin as everywhere else.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # Two allow-lists, because the shipping surface has two kinds of entry.
      #
      #   code — files that ARE the bundle. Any change here ships, full stop. This
      #          is fail-CLOSED: a NEW shipping path nobody adds here would be
      #          skipped, not shipped, so keep it current — it must not drift.
      #   pkg  — the dependency manifests. A path match here is NECESSARY but not
      #          SUFFICIENT: editing devDependencies/scripts leaves the shipped
      #          bundle byte-identical. So a pkg-only change is settled by content
      #          in the `decide` step below, not by the path alone.
      #
      # Everything unlisted (.github, test, scripts, docs, *.md, renovate.json,
      # vitest.config.js) neither ships nor deploys. SHA-pinned like every action
      # here; v4.0.2 was 15 days old at adoption, clearing our 14-day cooldown.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'manifest.yml'
              - 'static/**'
              - 'vite.view.config.js'
              - 'vite.config.config.js'
            pkg:
              - 'package.json'
              - 'package-lock.json'
      # Settle shippability. A `code` change always ships. A `pkg`-only change
      # ships only if the PRODUCTION (non-dev) dependency closure actually moved —
      # so a devDependencies/scripts/lockfile-dev-churn edit is correctly skipped,
      # while an in-range runtime bump (e.g. Mermaid 11.4.x → 11.5.0, which lands
      # lockfile-only and never touches package.json's `dependencies`) still ships.
      # scripts/prod-deps-fingerprint.mjs is the authority; see its header.
      #
      # Fail-CLOSED throughout: any inability to compare the before/after closure
      # (no resolvable before-commit, an unreachable SHA, a missing or unparseable
      # lockfile) errs toward shipping. Only two clean, equal fingerprints skip.
      #
      # Runs on the runner's preinstalled Node: the script is dependency-free (Node
      # builtins only), so this security-sensitive gate needs no `npm ci` — one
      # fewer thing installed next to a deploy decision.
      - name: Decide shippability
        id: decide
        env:
          CODE: ${{ steps.filter.outputs.code }}
          PKG: ${{ steps.filter.outputs.pkg }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -euo pipefail
          emit() { echo "shippable=$1" >> "$GITHUB_OUTPUT"; echo "shippable=$1"; }

          # A file that IS the bundle changed — ship, no content check needed.
          if [ "$CODE" = "true" ]; then emit true; exit 0; fi
          # Nothing shipped and no dependency manifest touched — nothing to ship.
          if [ "$PKG" != "true" ]; then emit false; exit 0; fi

          # package.json / package-lock.json changed: compare production closures.
          zero=0000000000000000000000000000000000000000
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "$zero" ]; then
            echo "no resolvable before-commit; shipping (fail-closed)"; emit true; exit 0
          fi
          if ! git fetch --depth=1 origin "$BEFORE" 2>/dev/null; then
            echo "could not fetch before-commit $BEFORE; shipping (fail-closed)"; emit true; exit 0
          fi
          if ! git show "$BEFORE:package-lock.json" > /tmp/before-lock.json 2>/dev/null; then
            echo "no before package-lock.json; shipping (fail-closed)"; emit true; exit 0
          fi
          before_fp=$(node scripts/prod-deps-fingerprint.mjs /tmp/before-lock.json) \
            || { echo "before fingerprint failed; shipping (fail-closed)"; emit true; exit 0; }
          after_fp=$(node scripts/prod-deps-fingerprint.mjs package-lock.json) \
            || { echo "after fingerprint failed; shipping (fail-closed)"; emit true; exit 0; }
          if [ "$before_fp" = "$after_fp" ]; then
            echo "production dependency closure unchanged ($after_fp); skipping deploy"; emit false
          else
            echo "production dependency closure changed ($before_fp -> $after_fp); shipping"; emit true
          fi

  staging:
    name: Deploy to staging
    needs: [corpus, audit, changes]
    # Deploy only a push to main that changed shipped code. The shippable check is
    # what makes a CI/test/docs-only merge skip the deploy; the other two guards
    # are unchanged.
    if: >-
      github.ref == 'refs/heads/main'
      && github.event_name == 'push'
      && needs.changes.outputs.shippable == 'true'
    runs-on: ubuntu-latest
    environment: staging
    # Serialise the deploy pipeline. Two quick pushes to main would otherwise
    # race two staging->production promotions against the same Forge app, and
    # whichever deploy finished last would win regardless of commit order.
    # cancel-in-progress: false — a half-finished deploy is worse than a slow one.
    concurrency:
      group: forge-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 -- the last 22.x before the node-fetch keep-alive
          # regression in 22.23.x. On 22.23.x the Forge CLI (still on node-fetch@2)
          # throws ERR_STREAM_PREMATURE_CLOSE mid-request fetching Atlassian's
          # OpenAPI schemas, failing lint AND deploy. Root cause is Node, not the
          # CLI: nodejs/node#63989, Atlassian FRGE-1750. 22.23.1 and 24.17.0 are
          # also on Forge's own Node blocklist. Bare "22" resolves to the latest
          # (bad) 22.x, so keep it exact.
          node-version: 22.22.3
          cache: npm
      # Installs @forge/cli from the lockfile. It used to be `npm i -g
      # @forge/cli@latest`, which resolved an unreviewed release on the runner
      # that then executed beside FORGE_API_TOKEN.
      - run: npm ci
      - run: npm run build
      # --non-interactive can't prompt for the analytics choice, so set it
      # explicitly on the fresh runner before deploying. Opt out.
      #
      # npx --no-install, not bare `forge`: the CLI is a devDependency now, and
      # a run: step does not get node_modules/.bin on PATH the way an npm script
      # does. --no-install makes a missing CLI fail loudly instead of silently
      # fetching one from the network, which is the point of pinning it.
      - run: npx --no-install forge settings set usage-analytics false
      # Catches real schema errors (a dangling resource key, say) before they
      # reach staging. It exits 0 on warnings and 1 on errors, so it blocks only
      # on the latter. It runs here, not in the corpus job, because it
      # authenticates against Atlassian and a PR job must not hold a token.
      #
      # It is NOT the guard on the zero-scope claim, and must not be mistaken
      # for one: a manifest requesting read:confluence-content.all plus egress
      # to an arbitrary host lints clean, because that is legal Forge. Legality
      # is the linter's business; the no-scopes policy is ours, and it is
      # enforced in test/manifest.test.js, on every PR, with no token needed.
      - name: forge lint
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: npm run lint:forge
      # Record the installed version BEFORE deploy so the verify step below has a
      # baseline. Non-fatal: the real gate is the verify step.
      - name: Snapshot installed version
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: node scripts/verify-deploy.mjs staging --snapshot
      - name: forge deploy
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: npx --no-install forge deploy -e staging --non-interactive
      # forge deploy exiting 0 means "uploaded", not "the installation advanced".
      # Poll install list until the staging installation reports Up-to-date, so a
      # deploy that lands a version the install never adopts fails here (blocking)
      # instead of surfacing only when someone opens Confluence.
      - name: Verify installed version advanced
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: node scripts/verify-deploy.mjs staging --verify

  # Production soaks in staging first, then this job runs — but the pause for a
  # human is NOT in this file: it comes from a required-reviewer rule on the
  # `production` GitHub Environment (Settings → Environments → production).
  # Verified present 2026-07-16: one required reviewer, admins cannot bypass.
  # Self-review is permitted, so with a single maintainer the rule is a
  # deliberate pause rather than a second pair of eyes — it stops an accidental
  # promotion, not a determined one.
  #
  # That environment has no deployment-branch policy, so the `if` below is the
  # only thing keeping production deploys on main. Editing it is enough to ship
  # from any branch; there is no second guard behind it.
  production:
    name: Promote to production
    needs: [staging]
    # The event_name check is redundant today — needs: [staging] already skips
    # this when staging skips. It is here so the guard states its own intent
    # instead of borrowing it from the needs graph, which someone will edit.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    # Same group as staging: one deploy pipeline in flight at a time. staging
    # has released the group by the time this starts (needs: [staging]), so
    # sharing the group queues the next push rather than deadlocking this one.
    concurrency:
      group: forge-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          # Pinned to 22.22.3 -- the last 22.x before the node-fetch keep-alive
          # regression in 22.23.x. On 22.23.x the Forge CLI (still on node-fetch@2)
          # throws ERR_STREAM_PREMATURE_CLOSE mid-request fetching Atlassian's
          # OpenAPI schemas, failing lint AND deploy. Root cause is Node, not the
          # CLI: nodejs/node#63989, Atlassian FRGE-1750. 22.23.1 and 24.17.0 are
          # also on Forge's own Node blocklist. Bare "22" resolves to the latest
          # (bad) 22.x, so keep it exact.
          node-version: 22.22.3
          cache: npm
      - run: npm ci
      - run: npm run build
      # --non-interactive can't prompt for the analytics choice, so set it
      # explicitly on the fresh runner before deploying. Opt out.
      #
      # npx --no-install, not bare `forge`: the CLI is a devDependency now, and
      # a run: step does not get node_modules/.bin on PATH the way an npm script
      # does. --no-install makes a missing CLI fail loudly instead of silently
      # fetching one from the network, which is the point of pinning it.
      - run: npx --no-install forge settings set usage-analytics false
      # Record the installed version BEFORE deploy so the verify step below has a
      # baseline. Non-fatal: the real gate is the verify step.
      - name: Snapshot installed version
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: node scripts/verify-deploy.mjs production --snapshot
      - name: forge deploy
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: npx --no-install forge deploy -e production --non-interactive
      # forge deploy exiting 0 means "uploaded", not "the installation advanced".
      # Poll install list until the production installation reports Up-to-date, so
      # a deploy that lands a version the install never adopts fails here
      # (blocking) instead of surfacing only when someone opens Confluence. If no
      # production installation is visible, this warns and passes rather than
      # blocking on a state it cannot verify.
      - name: Verify installed version advanced
        env:
          FORGE_EMAIL: ${{ secrets.FORGE_EMAIL }}
          FORGE_API_TOKEN: ${{ secrets.FORGE_API_TOKEN }}
        run: node scripts/verify-deploy.mjs production --verify
