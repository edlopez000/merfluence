<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mermaid diagram</title>
    <style>
      /* Sizes the body to its content instead of the iframe's default width.
         Declared in a <style> tag, not a style="" attribute, so this alone
         would not require the unsafe-inline permission — Mermaid's own output
         is what requires it. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: fit-content;
        min-width: 100%;
        background: transparent;
        font-family: var(
          --ds-font-family-sans,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif
        );
        color: var(--ds-text, #172b4d);
      }

      .root {
        position: relative;
        display: inline-block;
        min-width: 100%;
      }

      .stage {
        overflow: hidden;
        cursor: grab;
        /* Dragging pans the diagram; without this the drag selects the SVG's
           text labels instead. Source text is available via "Copy source". */
        user-select: none;
        -webkit-user-select: none;
      }
      .stage.dragging {
        cursor: grabbing;
      }
      /* The pan layer shrinks to the diagram's width and centres itself in the
         macro column, so a diagram narrower than the column sits in the middle
         instead of hugging the left. max-width keeps Mermaid's shrink-to-fit. */
      .pan {
        width: fit-content;
        max-width: 100%;
        margin: 0 auto;
      }
      .stage svg {
        display: block;
        max-width: 100%;
        height: auto;
      }
      .stage.no-shrink .pan {
        max-width: none;
      }
      .stage.no-shrink svg {
        max-width: none;
      }

      /* Fullscreen: ignore the interactive pan/zoom and fit the diagram to the
         screen, centred. We hand the SVG the full padded box; its viewBox plus
         the default preserveAspectRatio ("xMidYMid meet") does the scale-to-fit
         and centring, scaling small diagrams up (crisp, since it's vector) and
         large ones down. Exit with Esc. */
      .stage:fullscreen {
        background: var(--ds-surface, #fff);
        padding: 24px;
        box-sizing: border-box;
        cursor: default;
      }
      .stage:fullscreen .pan {
        transform: none !important;
        width: 100%;
        height: 100%;
        max-width: none;
        margin: 0;
      }
      .stage:fullscreen svg {
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        max-height: none !important;
      }

      /* Exit control, only visible in fullscreen (the toolbar is hidden there). */
      .fs-exit {
        display: none;
      }
      .stage:fullscreen .fs-exit {
        display: inline-flex;
        align-items: center;
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 1;
        appearance: none;
        border: 1px solid var(--ds-border, #dfe1e6);
        border-radius: 6px;
        background: var(--ds-surface-overlay, #fff);
        color: var(--ds-text, #172b4d);
        font: inherit;
        font-size: 13px;
        line-height: 1;
        padding: 8px 12px;
        cursor: pointer;
      }
      .stage:fullscreen .fs-exit:hover {
        background: var(--ds-background-neutral-subtle-hovered, #f1f2f4);
      }
      .stage:fullscreen .fs-exit:focus-visible {
        outline: 2px solid var(--ds-border-focused, #388bff);
        outline-offset: 1px;
      }

      .toolbar {
        position: absolute;
        top: 4px;
        right: 4px;
        display: flex;
        gap: 2px;
        padding: 2px;
        border-radius: 6px;
        background: var(--ds-surface-overlay, #fff);
        border: 1px solid var(--ds-border, #dfe1e6);
        opacity: 0;
        transition: opacity 120ms ease-in;
      }
      .root:hover .toolbar,
      .toolbar:focus-within {
        opacity: 1;
      }

      .toolbar button {
        appearance: none;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--ds-text-subtle, #44546f);
        font: inherit;
        font-size: 12px;
        line-height: 1;
        padding: 6px 8px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: var(--ds-background-neutral-subtle-hovered, #f1f2f4);
      }
      .toolbar button:focus-visible {
        outline: 2px solid var(--ds-border-focused, #388bff);
        outline-offset: 1px;
      }
      .toolbar .zoom-level {
        display: flex;
        align-items: center;
        padding: 0 4px;
        font-size: 12px;
        line-height: 1;
        color: var(--ds-text-subtlest, #626f86);
        font-variant-numeric: tabular-nums;
        min-width: 3.5ch;
        justify-content: center;
      }

      /* Version stamp: overlaid bottom-left and revealed on hover, like the
         toolbar, so it's there for bug reports without cluttering every diagram.
         Absolute (not in flow) so it reserves no empty line; pointer-events none
         so it never swallows a drag that starts over it. */
      .meta {
        position: absolute;
        bottom: 4px;
        left: 4px;
        font-size: 11px;
        line-height: 1;
        color: var(--ds-text-subtlest, #626f86);
        background: var(--ds-surface-overlay, #fff);
        border: 1px solid var(--ds-border, #dfe1e6);
        border-radius: 4px;
        padding: 3px 6px;
        opacity: 0;
        transition: opacity 120ms ease-in;
        pointer-events: none;
      }
      .root:hover .meta,
      .toolbar:focus-within ~ .meta {
        opacity: 1;
      }

      .message {
        padding: 12px 14px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.5;
      }
      .message.empty {
        border: 1px dashed var(--ds-border, #dfe1e6);
        color: var(--ds-text-subtle, #44546f);
      }
      .message.error {
        border-left: 3px solid var(--ds-border-danger, #c9372c);
        border-radius: 0;
        background: var(--ds-background-danger, #ffedeb);
        color: var(--ds-text-danger, #ae2e24);
      }
      .message pre {
        margin: 6px 0 0;
        font-family: var(--ds-font-family-code, ui-monospace, monospace);
        font-size: 12px;
        white-space: pre-wrap;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      @media (prefers-reduced-motion: reduce) {
        .toolbar,
        .meta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
