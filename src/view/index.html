<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Merfluence</title>
    <style>
      /* Sizes the body to its content instead of the iframe's default width.
         Declared in a <style> tag, not a style="" attribute, so this alone
         would not require the unsafe-inline permission — Mermaid's own output
         is what requires it. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: fit-content;
        min-width: 100%;
        background: transparent;
        font-family: var(
          --ds-font-family-sans,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif
        );
        color: var(--ds-text, #172b4d);
      }

      .root {
        position: relative;
        display: inline-block;
        min-width: 100%;
      }

      .stage {
        overflow: hidden;
        cursor: grab;
        /* Dragging pans the diagram; without this the drag selects the SVG's
           text labels instead. Source text is available via "Copy source". */
        user-select: none;
        -webkit-user-select: none;
      }
      .stage.dragging {
        cursor: grabbing;
      }
      /* The pan layer shrinks to the diagram's width and centres itself in the
         macro column, so a diagram narrower than the column sits in the middle
         instead of hugging the left. max-width keeps Mermaid's shrink-to-fit. */
      .pan {
        width: fit-content;
        max-width: 100%;
        margin: 0 auto;
      }
      .stage svg {
        display: block;
        max-width: 100%;
        height: auto;
      }
      .stage.no-shrink .pan {
        max-width: none;
      }
      .stage.no-shrink svg {
        max-width: none;
      }

      /* An explicit height chosen in the editor's Size dropdown (see SIZE_PRESETS
         in src/lib/sizing.js). The SVG scales to --diagram-height, keeping the
         aspect ratio from its viewBox; the .pan drops its column clamp so a
         now-wider diagram isn't squashed, and the existing pan/zoom reaches
         whatever overflows. Unset — the Natural preset — falls back to the
         natural fit rules above.

         :not(:fullscreen) because the preset sizes the macro within a page
         column, which means nothing once the stage IS the screen — it would
         strand a Small diagram as a 320px strip. Excluding the rules entirely is
         deliberate: fullscreen then reuses the natural rules above verbatim,
         rather than layering overrides that have to win an !important fight and
         reason about which of width/height stays definite. */
      .stage.sized:not(:fullscreen) .pan {
        max-width: none;
      }
      /* !important beats the inline max-width/width Mermaid writes onto the SVG
         when useMaxWidth is on. width:auto is only safe BECAUSE height is
         definite here: Mermaid emits width="100%" and no height attribute, so
         the viewBox ratio needs exactly one of the two fixed to resolve. Setting
         both to auto leaves the SVG with no size at all (a blank diagram). */
      .stage.sized:not(:fullscreen) svg {
        height: var(--diagram-height) !important;
        width: auto !important;
        max-width: none !important;
      }

      /* Fullscreen keeps the same interactive pan/zoom as the inline view — it's
         just a larger, backdropped stage, so the live transform on .pan stays in
         effect and you can zoom (plain wheel here) and drag around. On enter the
         fullscreenchange handler fits the diagram to the screen and centres it
         (see fitView in src/lib/zoom.js); on exit it restores the inline view.
         Centring is the JS's job, not this rule's: the fit zoom and the centring
         offset are one calculation, so splitting them across CSS and JS would
         mean measuring around whatever CSS had already done. Exit with Esc. */
      .stage:fullscreen {
        background: var(--ds-surface, #fff);
        padding: 24px;
        box-sizing: border-box;
      }

      /* Exit control, only visible in fullscreen (the toolbar is hidden there). */
      .fs-exit {
        display: none;
      }
      .stage:fullscreen .fs-exit {
        display: inline-flex;
        align-items: center;
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 1;
        appearance: none;
        border: 1px solid var(--ds-border, #dfe1e6);
        border-radius: 6px;
        /* background-color (not the `background` shorthand) so the hover overlay
           below layers ON TOP of this opaque fill. The button floats directly
           over the diagram, so its fill must stay opaque. */
        background-color: var(--ds-surface-overlay, #fff);
        color: var(--ds-text, #172b4d);
        font: inherit;
        font-size: 13px;
        line-height: 1;
        padding: 8px 12px;
        cursor: pointer;
      }
      /* Layer the (often translucent) subtle-hover token as a background-image
         over the opaque background-color, rather than replacing it — otherwise
         the diagram shows through on hover. */
      .stage:fullscreen .fs-exit:hover {
        background-image: linear-gradient(
          var(--ds-background-neutral-subtle-hovered, #091e420f),
          var(--ds-background-neutral-subtle-hovered, #091e420f)
        );
      }
      .stage:fullscreen .fs-exit:focus-visible {
        outline: 2px solid var(--ds-border-focused, #388bff);
        outline-offset: 1px;
      }

      .toolbar {
        position: absolute;
        top: 4px;
        right: 4px;
        display: flex;
        gap: 2px;
        padding: 2px;
        border-radius: 6px;
        background: var(--ds-surface-overlay, #fff);
        border: 1px solid var(--ds-border, #dfe1e6);
        opacity: 0;
        transition: opacity 120ms ease-in;
      }
      .root:hover .toolbar,
      .toolbar:focus-within {
        opacity: 1;
      }

      .toolbar button {
        appearance: none;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: var(--ds-text-subtle, #44546f);
        font: inherit;
        font-size: 12px;
        line-height: 1;
        padding: 6px 8px;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: var(--ds-background-neutral-subtle-hovered, #f1f2f4);
      }
      .toolbar button:focus-visible {
        outline: 2px solid var(--ds-border-focused, #388bff);
        outline-offset: 1px;
      }

      /* Export is a button that opens a small menu of formats (PNG / SVG),
         replacing the two separate buttons. The menu is absolutely positioned so
         it drops below without changing the toolbar's height. */
      .export {
        position: relative;
        display: flex;
      }
      .export-menu {
        position: absolute;
        top: calc(100% + 4px);
        right: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        min-width: 100%;
        padding: 2px;
        border-radius: 6px;
        background: var(--ds-surface-overlay, #fff);
        border: 1px solid var(--ds-border, #dfe1e6);
        box-shadow: var(--ds-shadow-overlay, 0 4px 8px rgba(9, 30, 66, 0.25));
      }
      .export-menu button {
        justify-content: flex-start;
        text-align: left;
      }
      /* The zoom percentage doubles as the "reset view" control (click to reset
         zoom + pan). It inherits .toolbar button styling, including hover. */
      .toolbar .zoom-level {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 6px;
        font-variant-numeric: tabular-nums;
        min-width: 4ch;
      }

      /* Version stamp: overlaid bottom-left and revealed on hover, like the
         toolbar, so it's there for bug reports without cluttering every diagram.
         Absolute (not in flow) so it reserves no empty line; pointer-events none
         so it never swallows a drag that starts over it. */
      .meta {
        position: absolute;
        bottom: 4px;
        left: 4px;
        font-size: 11px;
        line-height: 1;
        color: var(--ds-text-subtlest, #626f86);
        background: var(--ds-surface-overlay, #fff);
        border: 1px solid var(--ds-border, #dfe1e6);
        border-radius: 4px;
        padding: 3px 6px;
        opacity: 0;
        transition: opacity 120ms ease-in;
        pointer-events: none;
      }
      .root:hover .meta,
      .toolbar:focus-within ~ .meta {
        opacity: 1;
      }

      .message {
        padding: 12px 14px;
        border-radius: 4px;
        font-size: 14px;
        line-height: 1.5;
      }
      .message.empty {
        border: 1px dashed var(--ds-border, #dfe1e6);
        color: var(--ds-text-subtle, #44546f);
      }
      .message.error {
        border-left: 3px solid var(--ds-border-danger, #c9372c);
        border-radius: 0;
        background: var(--ds-background-danger, #ffedeb);
        color: var(--ds-text-danger, #ae2e24);
      }
      .message pre {
        margin: 6px 0 0;
        font-family: var(--ds-font-family-code, ui-monospace, monospace);
        font-size: 12px;
        white-space: pre-wrap;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      @media (prefers-reduced-motion: reduce) {
        .toolbar,
        .meta {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
