<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit diagram</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: transparent;
        font-family: var(
          --ds-font-family-sans,
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif
        );
        color: var(--ds-text, #172b4d);
        font-size: 14px;
      }
      #root {
        height: 100%;
      }

      .panel {
        display: flex;
        flex-direction: column;
        height: 100%;
        gap: 10px;
        padding: 12px;
        box-sizing: border-box;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--ds-text-subtle, #44546f);
      }
      select {
        font: inherit;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 4px;
        border: 1px solid var(--ds-border-input, #8590a2);
        background: var(--ds-surface, #fff);
        color: var(--ds-text, #172b4d);
      }

      .split {
        display: grid;
        grid-template-columns: minmax(280px, 1fr) minmax(280px, 1fr);
        gap: 12px;
        flex: 1;
        min-height: 0;
      }
      @media (max-width: 720px) {
        .split {
          grid-template-columns: 1fr;
        }
      }

      .pane {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border: 1px solid var(--ds-border, #dfe1e6);
        border-radius: 4px;
        overflow: hidden;
      }
      .pane-title {
        padding: 6px 10px;
        font-size: 11px;
        text-transform: none;
        color: var(--ds-text-subtlest, #626f86);
        border-bottom: 1px solid var(--ds-border, #dfe1e6);
        background: var(--ds-surface-sunken, #f7f8f9);
      }

      .editor {
        flex: 1;
        min-height: 0;
        overflow: auto;
      }
      .editor .cm-editor {
        height: 100%;
      }
      .editor .cm-scroller {
        font-family: var(--ds-font-family-code, ui-monospace, monospace);
        font-size: 13px;
      }

      .preview {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 12px;
        display: flex;
        align-items: flex-start;
        justify-content: center;
      }
      .preview svg {
        max-width: 100%;
        height: auto;
      }

      .diagnostic {
        border-left: 3px solid var(--ds-border-danger, #c9372c);
        background: var(--ds-background-danger, #ffedeb);
        color: var(--ds-text-danger, #ae2e24);
        padding: 8px 10px;
        font-size: 12px;
      }
      .diagnostic code {
        font-family: var(--ds-font-family-code, ui-monospace, monospace);
      }
      .diagnostic.ok {
        border-left-color: var(--ds-border-success, #22a06b);
        background: var(--ds-background-success, #dcfff1);
        color: var(--ds-text-success, #216e4e);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }
      button {
        font: inherit;
        font-size: 13px;
        padding: 6px 12px;
        border-radius: 4px;
        border: 0;
        cursor: pointer;
        background: var(--ds-background-neutral, #091e420f);
        color: var(--ds-text, #172b4d);
      }
      button.primary {
        background: var(--ds-background-brand-bold, #0c66e4);
        color: var(--ds-text-inverse, #fff);
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      button:focus-visible {
        outline: 2px solid var(--ds-border-focused, #388bff);
        outline-offset: 1px;
      }

      .cm-errorLine {
        background: var(--ds-background-danger, #ffedeb);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
